name: Validate Mappings

on:
  pull_request:
    branches: [main]
    paths:
      - 'mappings/**'
      - 'schemas/**'
      - 'scripts/**'
      - 'package.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
